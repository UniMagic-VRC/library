name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install qpdf
        run: sudo apt-get update && sudo apt-get install -y qpdf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache processed PDFs
        uses: actions/cache@v4
        with:
          path: .cache/pdf-materials
          key: pdf-materials-${{ runner.os }}-${{ hashFiles('materials/**/*.pdf', 'src/courses.meta.json', 'scripts/build-site.mjs', 'site/assets/unimagic-logo.svg', 'pnpm-lock.yaml') }}
          restore-keys: |
            pdf-materials-${{ runner.os }}-

      - name: Build site
        run: pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
